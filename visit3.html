<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit Us | AIT & Financial Solutions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #060a13; 
            --ait-dark-blue: #09377a; 
            --ait-red: #ff2a2a;      
            --ait-cyan: #4df0ff;     
            --text-white: #ffffff;
            --card-bg: #0d131f; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
            padding: 10px;
        }

        .logo-box img {
            height: 90px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(77, 240, 255, 0.2);
        }

        h1 { font-family: 'Orbitron'; color: var(--ait-cyan); font-size: 1.6rem; margin-bottom: 10px; }
        
        .info-card {
            background: var(--card-bg);
            border: 2px solid var(--ait-dark-blue);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
            position: relative;
            overflow: hidden;
            border-left: 5px solid var(--ait-red);
        }

        .address-title { color: var(--ait-red); font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 10px; }
        .address-text { font-size: 1rem; line-height: 1.6; margin-bottom: 15px; color: #ccc; }

        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--ait-cyan);
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .services-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .service-mini-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--ait-dark-blue);
        }

        .service-mini-card i { font-size: 1.4rem; color: var(--ait-cyan); margin-bottom: 8px; display: block; }
        .service-mini-card h4 { font-family: 'Orbitron'; font-size: 0.85rem; color: #fff; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-map { background: var(--ait-cyan); color: #000; }
        .btn-wa { background: #25d366; color: #fff; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        footer { margin-top: 40px; padding-bottom: 20px; font-size: 0.75rem; color: #555; font-family: 'Orbitron'; }

        @media (max-width: 600px) {
            .services-summary { grid-template-columns: 1fr; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-box">
            <img src="logo.png" alt="AIT Logo">
        </div>
        <h1>AIT & Financial Solutions</h1>
    </div>

    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d7411.8031053278855!2d72.148585!3d21.745342!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395f5bc5fa507169%3A0x17b41a0e5362b74f!2sAdvance%20Information%20Technology!5e0!3m2!1sen!2sin!4v1773310960747!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <div class="info-card">
        <h3 class="address-title"><i class="fas fa-location-arrow"></i> VISIT OUR OFFICE</h3>
        <p class="address-text">
            Plot No. 90, 2nd Floor, Arav Complex,<br>
            Opp. Rammantra Mandir,<br>
            Bhavnagar, Gujarat - 364001
        </p>
        <p style="font-size: 1.1rem; font-weight: bold; color: var(--ait-cyan);">
            <i class="fas fa-phone-alt"></i> +91 93277 36999
        </p>
    </div>

    <div class="services-summary">
        <div class="service-mini-card">
            <i class="fas fa-laptop-code"></i>
            <h4>AIT Education</h4>
        </div>
        <div class="service-mini-card">
            <i class="fas fa-microchip"></i>
            <h4>IT Solutions</h4>
        </div>
        <div class="service-mini-card" style="grid-column: span 2; border-color: #fbbf24; background: rgba(251, 191, 36, 0.05);">
            <i class="fas fa-umbrella" style="color: #fbbf24;"></i>
            <h4 style="color: #fbbf24;">TATA AIA Financial & Insurance Advisor</h4>
        </div>
    </div>

    <div class="btn-group">
        <a href="https://wa.me/919327736999" class="btn btn-wa">
            <i class="fab fa-whatsapp" style="margin-right: 10px; font-size: 1.2rem;"></i> WhatsApp Chat
        </a>
        <a href="index.html" style="color: var(--ait-cyan); text-decoration: none; margin-top: 10px; font-size: 0.8rem; font-family: 'Orbitron';">
            <i class="fas fa-globe"></i> Visit Website
        </a>
    </div>

    <footer>
        © 2026 ADVANCED INFORMATION TECHNOLOGY (AIT)
    </footer>
</div>

</body>
</html>
